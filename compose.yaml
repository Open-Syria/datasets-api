services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: opensyria_datasets
      POSTGRES_USER: opensyria
      POSTGRES_PASSWORD: opensyria
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opensyria -d opensyria_datasets']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
