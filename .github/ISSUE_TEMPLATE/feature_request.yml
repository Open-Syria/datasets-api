name: Feature Request
description: Suggest an API, tooling, or documentation improvement.
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What would this help people do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?

