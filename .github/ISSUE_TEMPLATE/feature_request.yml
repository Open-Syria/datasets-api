name: Maintainer Proposal
description: Discuss a possible API, tooling, or documentation change before maintainer implementation.
title: 'proposal: '
labels:
  - maintainer-review
body:
  - type: markdown
    attributes:
      value: This API repository is maintainer-led. Dataset corrections and missing data should go to the relevant dataset repository.
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What would this help people do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
