name: Bug Report
description: Report a reproducible issue in datasets-api.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve OpenSyria.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Include route, request, response, and environment details when possible.
      placeholder: |
        1. Run ...
        2. Request ...
        3. See ...
    validations:
      required: true

