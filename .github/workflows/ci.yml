name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: opensyria_datasets
          POSTGRES_USER: opensyria
          POSTGRES_PASSWORD: opensyria
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opensyria -d opensyria_datasets"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm run validate

      - name: Test database read model
        env:
          DATABASE_URL: postgresql://opensyria:opensyria@localhost:5432/opensyria_datasets?schema=public
          DATABASE_ENABLED: 'true'
          DATABASE_REQUIRED: 'true'
          REDIS_ENABLED: 'false'
        run: pnpm run test:integration:db

      - name: Build Docker image
        run: docker build -t opensyria/datasets-api:ci .
